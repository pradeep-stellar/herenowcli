name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: herenow

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_ext: ""
          - os: macos-13
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            binary_ext: ""
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Check tag matches Cargo version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(cargo pkgid | sed 's/.*@//')"
          if [ "$tag" != "$version" ]; then
            echo "Tag version $tag does not match Cargo.toml version $version" >&2
            exit 1
          fi

      - name: Test
        run: cargo test --locked

      - name: Build release binary
        run: make release TARGET=${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          package="${BIN_NAME}-${version}-${{ matrix.target }}"
          mkdir "$package"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}${{ matrix.binary_ext }}" "$package/"
          cp README.md LICENSE "$package/"
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            7z a "${package}.zip" "$package"
          else
            tar -czf "${package}.tar.gz" "$package"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ github.ref_name }}-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
